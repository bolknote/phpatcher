name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  unit:
    name: Core unit tests (${{ matrix.cc }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - cc: g++
            pkg: g++
          - cc: clang++
            pkg: clang
    steps:
      - uses: actions/checkout@v4

      - name: Install compiler
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.pkg }}

      - name: Build & run unit tests (strict warnings)
        run: make -C tests/unit test CXX=${{ matrix.cc }}

      - name: AddressSanitizer + UndefinedBehaviorSanitizer
        run: make -C tests/unit sanitize CXX=${{ matrix.cc }}

  extension:
    name: Extension on PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: opcache
          tools: none

      - name: Build
        run: |
          phpize
          ./configure --enable-phpatcher
          make

      - name: Run integration tests (.phpt)
        run: |
          set -o pipefail
          NO_INTERACTION=1 make test 2>&1 | tee phpt.log
          if grep -Eq '^Tests failed +: +[1-9]' phpt.log; then
            echo "::error::phpt integration tests failed"
            exit 1
          fi

      - name: Show diffs on failure
        if: failure()
        run: cat tests/*.diff 2>/dev/null || true
